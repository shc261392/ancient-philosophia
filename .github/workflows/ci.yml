name: CI / CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Cancel in-flight runs for the same branch/PR when a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── Type-check (runs in parallel with build) ──────────────────────────────
  check:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Astro type check
        run: pnpm check

  # ─── Build ─────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build site
        run: pnpm build

      - name: Upload dist artifact
        uses: actions/upload-artifact@v6
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─── Deploy (main-branch pushes only, after both jobs pass) ────────────────
  deploy:
    name: Deploy to Cloudflare
    runs-on: ubuntu-latest
    needs: [ check, build ]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://ancient-philosophia.org
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v5
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download dist artifact
        uses: actions/download-artifact@v6
        with:
          name: dist
          path: dist/

      # dotenvx decrypts .env.production using the private key stored in
      # DOTENV_PRIVATE_KEY_PRODUCTION and injects CLOUDFLARE_API_TOKEN +
      # CLOUDFLARE_ACCOUNT_ID into the wrangler process environment.
      - name: Deploy via Wrangler
        env:
          DOTENV_PRIVATE_KEY_PRODUCTION: ${{ secrets.DOTENV_PRIVATE_KEY_PRODUCTION }}
        run: pnpm dotenvx run -f .env.production -- pnpm wrangler deploy
